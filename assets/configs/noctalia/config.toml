[bar.default]
background_opacity = 0.90000000000000002
enabled = false
scale = 1.1000000089406967
thickness = 35

[bar.main]
background_opacity = 0.90000000000000002
center = [ "workspaces", "privacy" ]
end = [ "media", "tray", "notifications", "clipboard", "volume", "brightness", "battery", "control-center", "session" ]
margin_edge = 0
margin_ends = 0
padding = 20
radius = 0
scale = 1.1500000096857548
start = [ "sysmon", "cpu", "network_rx", "network_tx", "ram", "bluetooth", "network", "active_window" ]
thickness = 40
widget_spacing = 14

    [bar.main.monitor.DP-3]

[dock]
background_opacity = 1.0

[idle]
behavior_order = [ "lock", "screen-off" ]

    [idle.behavior.lock]
    action = "lock"
    command = "noctalia:session lock"
    enabled = true
    timeout = 660

    [idle.behavior.screen-off]
    action = "screen_off"
    command = "noctalia:dpms-off"
    enabled = true
    resume_command = "noctalia:dpms-on"
    timeout = 600

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@eDP-1", "lockscreen-login-box@DP-3", "lockscreen-login-box@DP-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 1280.0
    cy = 1321.0
    output = "DP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-3"]
